# Claude-specific allow-list rules, layered on top of the generic baseline in
# agent_uplink/default_rules.yaml. The per-mode auth rule (api.anthropic.com /
# bedrock-runtime.<region>.amazonaws.com) is appended at runtime by
# ClaudeAgent.auth_rules().

rules:
  # Only non-GET rules belong here: GET/OPTIONS/HEAD to any host is already
  # permitted by the generic default rule, so the old GET-only claude-changelog
  # (raw.githubusercontent.com) and claude-downloads (downloads.claude.ai) rules
  # were redundant and have been removed.
  - name: claude-logs
    hosts: [.*\.datadoghq\.com]
    methods: ["POST"]
    paths:
      - /api/v2/logs
