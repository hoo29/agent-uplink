name: Publish to PyPI

on:
  push:
    branches: [main]
    paths:
      - pyproject.toml
  workflow_dispatch:

jobs:
  check-version:
    name: detect version change
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare pyproject.toml version against state before the push
        id: check
        env:
          BEFORE: ${{ github.event.before }}
        run: |
          current=$(grep -m1 -oP '^version\s*=\s*"\K[^"]+' pyproject.toml)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch; publishing version $current"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Compare against the tip before the whole push, not HEAD~1, so a
          # version bump several commits deep (multi-commit push / rebase merge)
          # is still detected. Zero SHA = new branch with no prior state.
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            previous=""
          else
            previous=$(git show "$BEFORE:pyproject.toml" 2>/dev/null | grep -m1 -oP '^version\s*=\s*"\K[^"]+' || true)
          fi
          echo "previous=$previous current=$current"
          if [ "$current" != "$previous" ]; then
            echo "Version changed ($previous -> $current); publishing"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version unchanged; skipping publish"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  pypi-publish:
    name: upload release to PyPI
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install . .[build]

      - name: Build
        run: python -m build

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: "dist/agent_uplink-*"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
